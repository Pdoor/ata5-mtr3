*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0f1a;--s:#111827;--s2:#0f172a;--b:#1e293b;--b2:#334155;
  --t:#e2e8f0;--t2:#94a3b8;--t3:#64748b;--t4:#475569;
  --blue:#3b82f6;--green:#22c55e;--gd:#16a34a;--yel:#f59e0b;--yd:#d97706;
  --red:#ef4444;--rd:#dc2626;--pur:#8b5cf6;--cyan:#06b6d4;--pink:#ec4899;
  --f:'DM Sans','Segoe UI',system-ui,sans-serif;--m:'JetBrains Mono',monospace
}
body{font-family:var(--f);background:var(--bg);color:var(--t);min-height:100vh}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
button{cursor:pointer;font-family:var(--f)}input,select,textarea{font-family:var(--f)}
.hdr{background:linear-gradient(135deg,#1a1f3a,#0d1225);border-bottom:1px solid var(--b);padding:18px 24px}
.hdr-in{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;max-width:1600px;margin:0 auto}
.logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--green),var(--cyan));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;flex-shrink:0}
.hdr-t{font-size:20px;font-weight:700;letter-spacing:-.02em;color:#f1f5f9}
.hdr-s{font-size:11px;color:var(--t3);font-family:var(--m)}
.nbtn{padding:6px 14px;border-radius:7px;border:1px solid var(--b2);background:0;color:var(--t2);font-size:12px;font-weight:600;transition:.15s}
.nbtn.on{border-color:var(--blue);background:#1e3a5f;color:#93c5fd}
.btn-exp{padding:6px 14px;border-radius:7px;border:1px solid var(--gd);background:0;color:#86efac;font-size:12px;font-weight:600}
.main{padding:18px 24px;max-width:1600px;margin:0 auto}
.kpi-g{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:20px}
.kpi{background:var(--s);border:1px solid var(--b);border-radius:11px;padding:14px 16px;position:relative;overflow:hidden}
.kpi-bar{position:absolute;top:0;left:0;right:0;height:3px}
.kpi-v{font-size:26px;font-weight:700;line-height:1}
.kpi-l{font-size:11px;font-weight:600;color:var(--t2);margin-top:3px}
.kpi-sub{font-size:10px;color:var(--t4);font-family:var(--m)}
.deadlines{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.dl-card{background:var(--s);border:1px solid var(--b);border-radius:9px;padding:10px 14px;flex:1;min-width:200px}
.dl-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em}
.dl-date{font-size:14px;font-weight:700;font-family:var(--m)}
.dl-days{font-size:11px;font-weight:600;margin-top:2px}
.dl-card{position:relative}
.dl-edit{position:absolute;top:7px;right:8px;background:0;border:0;color:var(--t4);font-size:13px;cursor:pointer;padding:2px 4px;line-height:1;border-radius:4px;opacity:.55;transition:.15s}
.dl-edit:hover{color:var(--blue);opacity:1;background:var(--b)}
.dl-edit.custom{color:var(--yd);opacity:.8}
.dl-inp{background:var(--b);border:1px solid var(--blue);border-radius:5px;color:var(--t);font-family:var(--m);font-size:12px;padding:3px 6px;margin-top:4px;width:100%;outline:0}
.dl-inp:focus{border-color:var(--pur)}
.sync{font-size:11px;color:var(--t4);font-family:var(--m);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--gd);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync.err .sync-dot{background:var(--rd);animation:none}
.sync.pending .sync-dot{background:var(--yel)}
.err-banner{background:#2d1515;border:1px solid var(--rd);border-radius:9px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#fca5a5;display:flex;align-items:flex-start;gap:10px}
.prog-banner{background:#1c1a0d;border:1px solid var(--yd);border-radius:9px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#fde68a;display:flex;align-items:center;gap:10px}
.prog-bar-wrap{flex:1;height:6px;background:#2d2a10;border-radius:3px;overflow:hidden}
.prog-bar-fill{height:100%;background:var(--yd);border-radius:3px;transition:width .5s}
.fil{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.fi{padding:7px 12px;border-radius:7px;border:1px solid var(--b2);background:var(--b);color:var(--t);font-size:12px;outline:0}
.fi:focus{border-color:var(--blue)}
.fc{font-size:11px;color:var(--t3);font-family:var(--m)}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:10px}
.cd{background:var(--s);border:1px solid var(--b);border-radius:11px;padding:14px 16px;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.cd:hover{border-color:var(--blue);background:var(--s2)}
.cd.err-card{border-color:#dc262644}
.cd.empty-card{border-color:#d9770644}
.cd.no-data{opacity:.75}
.cd-p{position:absolute;top:0;left:0;height:3px;transition:width .3s}
.cd-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.cd-n{font-weight:700;font-size:14px;color:#f1f5f9}
.cd-g{font-size:11px;color:var(--t3)}
.cd-pct{font-size:17px;font-weight:700;font-family:var(--m)}
.badge{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;white-space:nowrap}
.dl{font-size:9px;color:var(--t4);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
.dots{display:flex;gap:3px}
.dot{width:22px;height:28px;border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-size:9px;font-weight:600}
.dot-date{font-size:7px;font-weight:500;line-height:1;opacity:.9;font-family:var(--m)}
.cd-footer{margin-top:6px;font-size:10px;border-top:1px solid var(--b);padding-top:5px}
.cd-footer.dates{color:var(--t4);font-family:var(--m)}
.cd-footer.nodata{color:var(--t4);font-style:italic}
.cd-footer.timeout{color:#fca5a5}
.cd-footer.empty-dr{color:#fdba74}
.cd-footer.notes{color:var(--t2);font-style:italic}
.det{background:var(--s);border:1px solid var(--b);border-radius:13px;padding:22px;margin-bottom:18px;position:relative;animation:sd .2s ease}
@keyframes sd{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.det-x{position:absolute;top:12px;right:14px;background:0;border:0;color:var(--t3);font-size:22px;line-height:1}
.det-x:hover{color:var(--t)}
.det-t{font-size:20px;font-weight:700;color:#f1f5f9;margin-bottom:3px}
.det-m{font-size:12px;color:var(--t3);margin-bottom:8px}
.det-m b{color:var(--t2);font-weight:600}
.det-link{font-size:11px;font-family:var(--m);word-break:break-all;margin-bottom:12px}
.det-alert{border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12px}
.det-alert.timeout{background:#2d1515;border:1px solid var(--rd);color:#fca5a5}
.det-alert.empty-dr{background:#1c1408;border:1px solid var(--yd);color:#fdba74}
.det-alert.nodata{background:#111827;border:1px solid var(--b2);color:var(--t3)}
.det-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:768px){.det-2{grid-template-columns:1fr}}
.dp{background:var(--s2);border-radius:9px;padding:12px;border:1px solid var(--b)}
.dp-t{font-size:11px;font-weight:700;color:var(--t2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.dr{display:flex;align-items:flex-start;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--b);flex-wrap:wrap;gap:4px}
.dr-st{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.dr-badge{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}
.dr-hist{font-size:9px;color:var(--t4);font-family:var(--m);cursor:pointer;border-bottom:1px dotted var(--t4)}
.hist-block{width:100%;margin-top:6px;background:#0c0f1a;border-radius:6px;padding:8px;border:1px solid var(--b)}
.hist-row{display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:1px solid var(--b);font-size:10px;font-family:var(--m)}
.hist-row:last-child{border-bottom:0}
.hist-ev{padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700}
.files-box{margin-top:12px;background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:10px;max-height:200px;overflow-y:auto}
.files-box h4{font-size:11px;color:var(--t3);margin-bottom:6px;text-transform:uppercase}
.fl{font-size:11px;color:var(--t2);padding:3px 0;border-bottom:1px solid #1e293b22;display:flex;justify-content:space-between}
.fl-s{color:var(--t4);font-family:var(--m);font-size:10px}
.notes-wrap{margin-bottom:14px}
.notes-lbl{font-size:11px;color:var(--t3);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.notes-area{width:100%;height:72px;padding:8px 10px;border-radius:8px;border:1px solid var(--b2);background:var(--s2);color:var(--t);font-size:12px;resize:vertical;outline:0}
.notes-area:focus{border-color:var(--blue)}
.note-item{background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:9px 11px;margin-bottom:6px;position:relative}
.note-item:hover{border-color:var(--b2)}
.note-cat{font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em;display:inline-block;margin-right:6px}
.note-cat.cat-comune{background:#1e3a5f;color:#93c5fd}
.note-cat.cat-gestore{background:#052e16;color:#86efac}
.note-cat.cat-pef{background:#431407;color:#fdba74}
.note-date{font-size:10px;color:var(--t4);font-family:var(--m)}
.note-text{font-size:12px;color:var(--t);margin-top:4px;line-height:1.4;white-space:pre-wrap}
.note-actions{position:absolute;top:7px;right:8px;display:flex;gap:3px;opacity:0;transition:.15s}
.note-item:hover .note-actions{opacity:1}
.note-act{background:0;border:0;color:var(--t4);font-size:12px;cursor:pointer;padding:2px 4px;border-radius:3px;line-height:1}
.note-act:hover{color:var(--t);background:var(--b)}
.note-add{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:7px;border:1px dashed var(--b2);background:0;color:var(--t3);font-size:11px;cursor:pointer;width:100%;transition:.15s;font-family:var(--f)}
.note-add:hover{border-color:var(--blue);color:var(--blue);background:var(--s2)}
.note-form{background:#0d1b2a;border:1px solid var(--blue);border-radius:8px;padding:10px 12px;margin-top:6px;animation:sd .15s ease}
.note-form-row{display:flex;gap:8px;align-items:center;margin-bottom:7px;flex-wrap:wrap}
.note-form-row:last-child{margin-bottom:0}
.note-cat-btn{padding:4px 10px;border-radius:5px;border:1px solid var(--b2);background:var(--b);color:var(--t3);font-size:10px;cursor:pointer;font-weight:600;transition:.15s;font-family:var(--f)}
.note-cat-btn.sel{border-color:var(--blue);background:#1e3a5f;color:#93c5fd}
.note-children{margin-left:18px;border-left:2px solid var(--b);padding-left:10px;margin-top:4px}
.note-reply-btn{background:0;border:0;color:var(--t4);font-size:10px;cursor:pointer;padding:1px 5px;border-radius:3px;font-family:var(--f);transition:.1s;margin-top:3px}
.note-reply-btn:hover{color:var(--blue);background:var(--b)}

.note-author-btn.sel{border-color:var(--pur);background:#2e1065;color:#c4b5fd}

.pwd-btn{margin-left:10px;padding:2px 9px;border-radius:5px;border:1px solid var(--b2);background:0;color:var(--t4);font-size:11px;cursor:pointer;transition:.15s;font-family:var(--f);vertical-align:middle}
.pwd-btn:hover{border-color:var(--pur);color:var(--pur)}
.pwd-box{display:flex;align-items:center;gap:7px;background:var(--b);border:1px solid var(--b2);border-radius:7px;padding:5px 10px;margin-top:6px;animation:sd .15s ease}
.pwd-val{font-family:var(--m);font-size:13px;font-weight:600;color:var(--t);letter-spacing:.08em;min-width:90px}
.pwd-act{background:0;border:0;color:var(--t3);cursor:pointer;font-size:14px;line-height:1;padding:2px 5px;border-radius:4px;transition:.1s}
.pwd-act:hover{color:var(--t);background:var(--b2)}
.pwd-timer{font-size:10px;color:var(--t4);font-family:var(--m);margin-left:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
thead tr{background:var(--b)}
th{padding:8px 6px;font-size:10px;color:var(--t2);font-weight:600;text-align:center;white-space:nowrap;border-bottom:2px solid var(--b2)}
th.l{text-align:left}
td{padding:7px 6px;border-bottom:1px solid var(--b)}
tbody tr{background:var(--s);cursor:pointer;transition:.1s}
tbody tr:hover{background:var(--s2)}
.drive-lnk{color:var(--blue);font-size:13px}
.ov-btn{background:0;border:0;font-size:11px;cursor:pointer;padding:1px 5px;border-radius:3px;color:var(--t4);line-height:1;transition:.1s;margin-left:4px;vertical-align:middle}
.ov-btn:hover{color:var(--blue);background:var(--b)}.ov-btn.active{color:var(--yd)}
.ov-badge{padding:1px 5px;border-radius:3px;font-size:9px;background:#422006;color:#fdba74;font-weight:700;margin-left:4px;vertical-align:middle}
.ov-form{width:100%;margin-top:6px;background:#0d1b2a;border:1px solid var(--yd);border-radius:7px;padding:8px 10px;animation:sd .15s ease}
.ov-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.ov-row:last-child{margin-bottom:0}
.ov-st{padding:3px 9px;border-radius:5px;border:1px solid var(--b2);background:var(--b);color:var(--t2);font-size:11px;cursor:pointer;transition:.1s;font-family:var(--f)}
.ov-st.sel{border-color:var(--rd);background:#2d1515;color:#fca5a5;font-weight:600}
.ov-st.sel-g{border-color:var(--gd);background:#052e16;color:#86efac;font-weight:600}
.ov-inp{background:var(--b);border:1px solid var(--blue);border-radius:5px;color:var(--t);font-family:var(--m);font-size:11px;padding:3px 7px;outline:0}
.ov-inp:focus{border-color:var(--pur)}
.ov-save{padding:3px 10px;border-radius:5px;border:1px solid var(--gd);background:#052e16;color:#86efac;font-size:11px;cursor:pointer;font-family:var(--f)}
.ov-del{padding:3px 10px;border-radius:5px;border:1px solid var(--b2);background:0;color:var(--t4);font-size:11px;cursor:pointer;font-family:var(--f)}
.ov-del:hover{border-color:var(--rd);color:var(--rd)}
</style>

function jsProcessabilita(s){
  if(!s?.docs)return null;

  const dich=["dich_veridicita","dich_veridicita_c"];
  const allObb=obb.every(k=>(s.docs[k]?.status||"missing")==="received");
  const allDich=dich.every(k=>(s.docs[k]?.status||"missing")==="received");
  if(allObb&&allDich)return"si";if(allObb)return"si_riserva";return"no";
}
function _mergedOverrides(){
  // ONLINE_OVERRIDES ha priorità su LOCAL_OVERRIDES
  return Object.assign({},LOCAL_OVERRIDES,ONLINE_OVERRIDES);

function applyOverrides(id,s){
  const sid=String(id);
  const merged=_mergedOverrides();
  const keys=Object.keys(merged).filter(k=>k.startsWith(sid+"_"));
  if(!keys.length)return s;
  const base=s?JSON.parse(JSON.stringify(s)):{docs:{},last_scan:null,last_scan_error:false,last_scan_empty:false};
  if(!base.docs)base.docs={};
  keys.forEach(k=>{
    const docKey=k.slice(sid.length+1);
    const ov=merged[k];
    // Lo scanner vince sempre: l'override vale solo come tappabuchi
    // quando lo script non ha trovato il documento (missing/removed/assente)
    if(base.docs[docKey]?.status==="received")return;
    base.docs[docKey]={...(base.docs[docKey]||{}),status:ov.status,
      first_upload:ov.date||base.docs[docKey]?.first_upload||null,
      last_upload:ov.date||base.docs[docKey]?.last_upload||null,
      _manual:true};
  });
  base.processabile=jsProcessabilita(base);
  return base;
}

async function _derivePwdKey(pass,salt,usage=["decrypt"]){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pass),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:100000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,usage);
}
async function _encryptText(text,pass){
  const salt=crypto.getRandomValues(new Uint8Array(16));
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const key=await _derivePwdKey(pass,salt,["encrypt"]);
  const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,new TextEncoder().encode(text));
  const out=new Uint8Array(16+12+ct.byteLength);
  out.set(salt,0);out.set(iv,16);out.set(new Uint8Array(ct),28);
  return btoa(String.fromCharCode(...out));
}
async function _decryptText(b64,pass){
  try{
    const b=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
    const key=await _derivePwdKey(pass,b.slice(0,16),["decrypt"]);
    const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b.slice(16,28)},key,b.slice(28));
    return new TextDecoder().decode(pt);
  }catch(e){return null;}
}
async function _tryDecrypt(b64,pass){
  try{
    const b=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
    const k=await _derivePwdKey(pass,b.slice(0,16));
    const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b.slice(16,28)},k,b.slice(28));
    return JSON.parse(new TextDecoder().decode(pt));
  }catch(e){return null;}
}
async function _tryDecryptRaw(b64,pass){
  try{
    const b=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
    const k=await _derivePwdKey(pass,b.slice(0,16));
    const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b.slice(16,28)},k,b.slice(28));
    return new TextDecoder().decode(pt);
  }catch(e){return null;}
}

async function loadOverrides(){
  try{
    const r=await fetch(OVERRIDES_URL+"?t="+Date.now());
    if(r.ok){
      const d=await r.json();
      // Supporta sia formato nested {docs,scadenze,notes} sia flat legacy
      if(d&&d.docs!==undefined){
        ONLINE_OVERRIDES=d.docs||{};
        ONLINE_SCADENZE=d.scadenze||{};
        // Note cifrate: salva blob, decripta solo se loggato
        if(d.notes_encrypted){
          _encNotesRaw=d.notes_encrypted;
          if(_notesKey)await _decryptOnlineNotes();
        }else if(d.notes){
          // Retrocompatibilità: note in chiaro (vecchio formato)
          ONLINE_NOTES=_migrateNotes(d.notes);
        }
      }else{
        ONLINE_OVERRIDES=d||{};
      }
    }
  }catch(e){}
}

// ── Salva overrides su GitHub via API ──
async function saveOverrideOnline(){
  if(!_ghToken)return false;
  _ovSaving=true;
  try{
    const apiUrl="https://api.github.com/repos/"+GH_REPO.owner+"/"+GH_REPO.repo+"/contents/"+GH_REPO.path;
    const headers={Authorization:"token "+_ghToken,Accept:"application/vnd.github.v3+json","Content-Type":"application/json"};
    // Recupera SHA attuale
    let sha=null;
    const getR=await fetch(apiUrl,{headers});
    if(getR.ok){const gd=await getR.json();sha=gd.sha||null;}
    // Prepara contenuto (base64 UTF-8)
    // Cifra le note prima di salvare
    let notesEnc=null;
    if(_notesKey){try{notesEnc=await _encryptNotes(ONLINE_NOTES);}catch(e){}}
    const payload={docs:ONLINE_OVERRIDES,scadenze:ONLINE_SCADENZE};
    if(notesEnc){payload.notes_encrypted=notesEnc;}else{payload.notes=ONLINE_NOTES;}
    const json=JSON.stringify(payload,null,2);
    const bytes=new TextEncoder().encode(json);
    let b64="";const chunk=8192;
    for(let i=0;i<bytes.length;i+=chunk){b64+=btoa(String.fromCharCode(...bytes.slice(i,i+chunk)));}
    const body={message:"Override "+new Date().toISOString().slice(0,16).replace("T"," "),content:b64};
    if(sha)body.sha=sha;
    const putR=await fetch(apiUrl,{method:"PUT",headers,body:JSON.stringify(body)});
    _ovSaving=false;
    if(putR.ok)return true;
    console.warn("GitHub API PUT:",putR.status);
    return false;
  }catch(e){_ovSaving=false;console.warn("saveOverrideOnline:",e);return false;}
}

// ── Helpers ──
function h(t,a,...ch){
  const e=document.createElement(t);
  if(a)Object.entries(a).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")e.className=v;
    else if(k==="innerHTML")e.innerHTML=v;
    else e.setAttribute(k,v);
  });
  ch.flat(5).forEach(c=>{if(c!=null)e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c)});
  return e;
}
function fmtDate(iso){if(!iso)return"—";try{return new Date(iso).toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit",year:"numeric"})}catch(e){return"—"}}
function fmtDT(iso){if(!iso)return"—";try{return new Date(iso).toLocaleString("it-IT",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"})}catch(e){return"—"}}
function fmtSize(b){if(!b)return"";if(b<1024)return b+"B";if(b<1048576)return(b/1024).toFixed(1)+"KB";return(b/1048576).toFixed(1)+"MB"}
function fmtShortDate(iso){if(!iso)return"";try{const d=new Date(iso);return String(d.getUTCDate()).padStart(2,"0")+"/"+String(d.getUTCMonth()+1).padStart(2,"0");}catch(e){return""}}
function daysUntil(s){if(!s)return null;return Math.ceil((new Date(s)-new Date())/864e5)}
function getState(id){if(!JDATA?.comuni)return null;return JDATA.comuni[String(id)]||null;}
function getDocSt(s,key){if(!s)return{status:"missing"};return s.docs?.[key]||{status:"missing"};}
function pct(s){if(!s)return 0;return Math.round(DOC_MANDATORY.filter(d=>getDocSt(s,d.key).status==="received").length/DOC_MANDATORY.length*100);}
function getGestori(){return[...new Set(COMUNI.map(c=>c.gestore))].sort()}
function getFiltered(){
  return COMUNI.filter(c=>{
    if(search&&!c.comune.toLowerCase().includes(search.toLowerCase())&&!c.gestore.toLowerCase().includes(search.toLowerCase()))return false;
    if(fGest!=="all"&&c.gestore!==fGest)return false;
    const s=getEffectiveState(c.id),p=pct(s);
    if(fStat==="completo"&&p<100)return false;
    if(fStat==="incompleto"&&(p===0||p===100))return false;
    if(fStat==="vuoto"&&p>0)return false;
    if(fStat==="timeout"&&!s?.last_scan_error)return false;
    if(fStat==="empty"&&!s?.last_scan_empty)return false;
    if(fStat==="nodata"&&s!==null)return false;
    if(fStat==="pefvalid"&&getDocSt(s,"pef_validato").status!=="received")return false;
    return true;
  });
}
function getStats(){
  let comp=0,parz=0,vuoti=0,timeout=0,empty=0,nodata=0,gC=0,cC=0,pefC=0,proc=0,procR=0;
  COMUNI.forEach(c=>{
    const s=getEffectiveState(c.id),p=pct(s);
    if(getState(c.id)===null&&s===null)nodata++;
    else if(p===100)comp++;else if(p>0)parz++;else vuoti++;
    if(s?.last_scan_error)timeout++;
    if(s?.last_scan_empty)empty++;
    DOC_G.forEach(d=>{if(getDocSt(s,d.key).status==="received")gC++;});
    DOC_C.forEach(d=>{if(getDocSt(s,d.key).status==="received")cC++;});
    DOC_ATA5.forEach(d=>{if(getDocSt(s,d.key).status==="received")pefC++;});
    if(s?.processabile==="si")proc++;
    if(s?.processabile==="si_riserva")procR++;
  });
  return{total:COMUNI.length,comp,parz,vuoti,timeout,empty,nodata,gC,cC,pefC,proc,procR};
}

// ── Export CSV ──
function exportCSV(){
  const rows=[["#","Comune","Gestore","Advisor","G:Tool","G:Rel","G:Dich","G:Altre","C:Tool","C:Rel","C:Dich","C:Altre","PEF Validato","%","Processabile","Primo Upload","Ultimo G","Ultimo C","Timeout","Note"]];
  COMUNI.forEach(c=>{
    const s=getEffectiveState(c.id),p=pct(s);
    const firstUp=s?ALL_DOCS.map(d=>getDocSt(s,d.key).first_upload).filter(Boolean).sort()[0]:null;
    const lastG=s?DOC_G.map(d=>getDocSt(s,d.key).last_upload).filter(Boolean).sort().pop():null;
    const lastC=s?DOC_C.map(d=>getDocSt(s,d.key).last_upload).filter(Boolean).sort().pop():null;
    rows.push([c.id,c.comune,c.gestore,c.advisor||"",
      ...DOC_G.map(d=>ST[getDocSt(s,d.key).status]?.label||"Mancante"),
      ...DOC_C.map(d=>ST[getDocSt(s,d.key).status]?.label||"Mancante"),
      ...DOC_ATA5.map(d=>ST[getDocSt(s,d.key).status]?.label||"Mancante"),
      p+"%",s?.processabile?PR[s.processabile]?.label||"":"-",
      fmtDate(firstUp),fmtDate(lastG),fmtDate(lastC),
      s?.last_scan_error?"SI":"",
      (function flatNotes(arr,depth){return arr.map(n=>(" ".repeat(depth))+n.author+" ["+n.cat+"] "+n.date+": "+n.text+(n.children?.length?"\n"+flatNotes(n.children,depth+1):"")).join("\n");}(_getNotes(c.id),0)).replace(/[\n\r]+/g," | ")
    ]);
  });
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(";")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="ATA5_MTR3_2026_stato.csv";a.click();
}

// ── CARD ──
function renderCard(c){

  const col=s===null?"var(--t4)":p===100?"var(--green)":p>0?"var(--yel)":"var(--red)";

  const lastG=s?DOC_G.map(d=>getDocSt(s,d.key).last_upload).filter(Boolean).sort().pop():null;
  const lastC=s?DOC_C.map(d=>getDocSt(s,d.key).last_upload).filter(Boolean).sort().pop():null;

  let cls="cd";if(s?.last_scan_error)cls+=" err-card";else if(s?.last_scan_empty)cls+=" empty-card";if(s===null)cls+=" no-data";
  const card=h("div",{className:cls,onClick:()=>{selId=c.id;render()}},
    h("div",{className:"cd-p",style:{width:p+"%",background:col}}),
    h("div",{className:"cd-h"},
      h("div",null,h("div",{className:"cd-n"},c.comune),h("div",{className:"cd-g"},c.gestore+(c.advisor?" · "+c.advisor:""))),
      h("div",{style:{display:"flex",alignItems:"center",gap:"6px"}},
        h("span",{className:"cd-pct",style:{color:col}},s!==null?p+"%":"—"),
        pc?h("span",{className:"badge",style:{background:pc.bg,color:pc.color}},pc.label):null
      )
    ),
    h("div",{style:{display:"flex",gap:"14px"}},makeDots("Gestore",DOC_G,s),makeDots("Comune",DOC_C,s),makeDots("ATA5",DOC_ATA5,s)),
  );

  // Footer contestuale
  if(s?.last_scan_error){
    card.appendChild(h("div",{className:"cd-footer timeout"},
      "⚠ Timeout nell'ultimo scan"+(s.last_scan?" · "+fmtDT(s.last_scan):"")));
  }else if(s?.last_scan_empty){
    card.appendChild(h("div",{className:"cd-footer empty-dr"},
      "📂 Cartella vuota"+(s.last_scan?" · "+fmtDT(s.last_scan):"")));
  }else if(s===null){
    card.appendChild(h("div",{className:"cd-footer nodata"},"In attesa della prima scansione"));
  }else if(firstUp||lastG||lastC){
    const parts=[];
    if(firstUp)parts.push("1° upload: "+fmtDate(firstUp));
    if(lastG)parts.push("G: "+fmtDate(lastG));
    if(lastC)parts.push("C: "+fmtDate(lastC));
    card.appendChild(h("div",{className:"cd-footer dates"},parts.join(" · ")));
  }
  const _cardNotes=_currentUser?_getNotes(c.id):[];
  if(_cardNotes.length){
    const last=_cardNotes[0]; // prima nota (ordinate per data desc)
    const catLbl=NOTE_CATS.find(x=>x.key===last.cat)?.label||"";
    const n=(last.author?last.author+" · ":"")+(catLbl?"["+catLbl+"] ":"")+last.text;
    card.appendChild(h("div",{className:"cd-footer notes"},n.length>80?n.slice(0,80)+"…":n));
  }
  return card;
}

function makeDots(label,docs,s){
  const dots=h("div",{className:"dots"});
  docs.forEach(d=>{
    const ds=getDocSt(s,d.key),cfg=ST[ds.status]||ST.missing;
    let title=d.label+": "+cfg.label;
    if(ds.first_upload)title+="\nPrimo: "+fmtDate(ds.first_upload);
    if(ds.last_upload&&ds.last_upload!==ds.first_upload)title+="\nUltimo: "+fmtDate(ds.last_upload);
    if(ds.replaced&&ds.upload_history?.length)title+="\n(Sostituito "+(ds.upload_history.length-1)+"x)";
    const uploadDate=ds.status==="received"?fmtShortDate(ds.last_upload||ds.first_upload):"";
    dots.appendChild(h("div",{className:"dot",title:title,
      style:{background:cfg.bg,border:"1px solid "+cfg.color+"33",color:cfg.color}},
      cfg.icon,
      uploadDate?h("span",{className:"dot-date"},uploadDate):null
    ));
  });
  return h("div",null,h("div",{className:"dl"},label),dots);
}

  const meta=h("div",{className:"det-m"});
  meta.innerHTML=`Gestore: <b>${c.gestore}</b>${c.advisor?` · Advisor: <b>${c.advisor}</b>`:""}`;
  if(s?.last_scan)meta.innerHTML+=` · Ultimo scan: <b>${fmtDT(s.last_scan)}</b>`;
  det.appendChild(meta);
  const pwdRow=h("div",{className:"det-link"});
  pwdRow.appendChild(h("a",{href:c.url,target:"_blank"},c.url));
  pwdRow.appendChild(h("button",{className:"pwd-btn",onClick:()=>showPwd(c.id,c.url,pwdRow)},"🔑 password"));
  det.appendChild(pwdRow);

  if(s?.last_scan_error){
    det.appendChild(h("div",{className:"det-alert timeout"},
      "⚠ L'ultimo download è andato in timeout. I dati mostrati (se presenti) sono dell'ultima scansione andata a buon fine."));
  }else if(s?.last_scan_empty){
    det.appendChild(h("div",{className:"det-alert empty-dr"},
      "📂 La dataroom è accessibile ma non contiene ancora file. Il comune o il gestore non ha ancora effettuato caricamenti."));
  }else if(!s){
    det.appendChild(h("div",{className:"det-alert nodata"},
      "Nessun dato ancora: questo comune non è stato scansionato. La prima scansione automatica popolerà questa scheda."));
  }

  // Note strutturate ad albero — visibili solo dopo login, modificabili solo admin
  const nw=h("div",{className:"notes-wrap"},h("label",{className:"notes-lbl"},"Note / Anomalie / Interlocuzioni"));
  if(!_currentUser){
    nw.appendChild(h("div",{style:{fontSize:"11px",color:"var(--t4)",padding:"8px 0",fontStyle:"italic"}},
      "🔒 Effettua il login per visualizzare le note"));
    det.appendChild(nw);
  } else {
  const notes=_getNotes(id);

  function renderNoteTree(noteArr,parentPath){
    const container=h("div",parentPath.length?{className:"note-children"}:{});
    noteArr.forEach((note,idx)=>{
      const path=[...parentPath,idx];
      const pathStr=path.join(".");
      const catCfg=NOTE_CATS.find(c=>c.key===note.cat)||NOTE_CATS[0];
      const ni=h("div",{className:"note-item"},
        h("div",null,
          h("span",{className:"note-author"},note.author||"—"),
          h("span",{className:"note-cat "+catCfg.cls},catCfg.label),
          h("span",{className:"note-date"},fmtDate(note.date))
        ),
        h("div",{className:"note-text"},note.text)
      );
      // Pulsanti azioni (hover, solo admin)
      if(_userRole==="admin"){
        const acts=h("div",{className:"note-actions"});
        acts.appendChild(h("button",{className:"note-act",title:"Rispondi",onClick:async e=>{
          e.stopPropagation();
          editingNote={comuneId:id,path,mode:"reply"};render();
        }},"↩"));
        acts.appendChild(h("button",{className:"note-act",title:"Modifica",onClick:async e=>{
          e.stopPropagation();
          editingNote={comuneId:id,path,mode:"edit"};render();
        }},"✏"));
        acts.appendChild(h("button",{className:"note-act",title:"Elimina",onClick:async e=>{
          e.stopPropagation();
          if(!confirm("Eliminare questa nota"+(note.children?.length?" e le sue risposte":"")+"?"))return;
          const arr=JSON.parse(JSON.stringify(_getNotes(id)));
          _removeAtPath(arr,path);
          const sid=String(id);
          ONLINE_NOTES[sid]=arr;LOCAL_NOTES[sid]=arr;
          saveNotes();saveOverrideOnline();render();
        }},"🗑"));
        ni.appendChild(acts);
      }
      container.appendChild(ni);
      // Form modifica inline
      if(editingNote?.comuneId===id&&editingNote?.mode==="edit"&&editingNote?.path?.join(".")===pathStr){
        container.appendChild(_renderNoteForm(id,path,"edit",note));
      }
      // Figli ricorsivi
      if(note.children?.length){
        container.appendChild(renderNoteTree(note.children,path));
      }
      // Form reply inline (dopo i figli)
      if(editingNote?.comuneId===id&&editingNote?.mode==="reply"&&editingNote?.path?.join(".")===pathStr){
        const replyWrap=h("div",{className:"note-children"});
        replyWrap.appendChild(_renderNoteForm(id,path,"reply",null));
        container.appendChild(replyWrap);
      }
    });
    return container;
  }
  nw.appendChild(renderNoteTree(notes,[]));

  // Pulsante "Inserisci nota" (solo admin)
  if(_userRole==="admin"){
    if(!(editingNote?.comuneId===id&&editingNote?.mode==="new")){
      nw.appendChild(h("button",{className:"note-add",onClick:async()=>{
        editingNote={comuneId:id,path:[],mode:"new"};render();
      }},"＋ Inserisci nota"));
    }else{
      nw.appendChild(_renderNoteForm(id,[],"new",null));
    }
  }
  det.appendChild(nw);
  } // fine else _currentUser

  // Pannelli documenti
  const cols=h("div",{className:"det-2"});
  cols.appendChild(makeDocPanel("Documenti Gestore (MTR3)",DOC_G,s,id));
  cols.appendChild(makeDocPanel("Documenti Comune (MTR3)",DOC_C,s,id));
  det.appendChild(cols);
  // Pannello ATA5 / PEF Validato (larghezza piena)
  det.appendChild(makeDocPanel("PEF Validato — ATA5",DOC_ATA5,s,id));

  if(s?.all_files?.length){
    const fb=h("div",{className:"files-box"});
    fb.appendChild(h("h4",null,"File nello zip ("+s.all_files.length+")"));
    s.all_files.forEach(f=>{
      fb.appendChild(h("div",{className:"fl"},
        h("span",null,(f.doc_key?"["+f.doc_key+"] ":"[?] ")+f.name),
        h("span",{className:"fl-s"},fmtSize(f.size))));
    });
    det.appendChild(fb);
  }
  if(s?.unclassified_files?.length){
    const ub=h("div",{className:"files-box",style:{borderColor:"var(--yd)"}});
    ub.appendChild(h("h4",{style:{color:"var(--yd)"}},"File non classificati ("+s.unclassified_files.length+") — verificare"));
    s.unclassified_files.forEach(f=>{
      ub.appendChild(h("div",{className:"fl"},h("span",null,(f.source||"?")+": "+f.name),h("span",{className:"fl-s"},fmtSize(f.size))));
    });
    det.appendChild(ub);
  }
  return det;
}

// Navigazione albero note via path [0,2,1] = notes[0].children[2].children[1]
function _getAtPath(arr,path){
  let node=null;
  let list=arr;
  for(const idx of path){node=list[idx];list=node?.children||[];}
  return node;
}
function _removeAtPath(arr,path){
  if(path.length===1){arr.splice(path[0],1);return;}
  const parent=_getAtPath(arr,path.slice(0,-1));
  if(parent?.children)parent.children.splice(path[path.length-1],1);
}
function _setAtPath(arr,path,val){
  if(path.length===1){arr[path[0]]=val;return;}
  const parent=_getAtPath(arr,path.slice(0,-1));
  if(parent?.children)parent.children[path[path.length-1]]=val;
}

function _renderNoteForm(comuneId,path,mode,existing){
  const isNew=mode==="new"||mode==="reply";
  let cat=existing?.cat||"comune";
  let date=existing?.date||new Date().toISOString().slice(0,10);
  let text=existing?.text||"";
  let author=existing?.author||_currentUser||NOTE_AUTHORS[0].key;
  const titleMap={new:"Nuova nota",edit:"Modifica nota",reply:"Rispondi alla nota"};
  const form=h("div",{className:"note-form"});
  form.appendChild(h("div",{style:{fontSize:"10px",color:"var(--blue)",marginBottom:"5px",fontWeight:"600"}},titleMap[mode]||"Nota"));
  // Sync GitHub indicator
  form.appendChild(h("div",{style:{fontSize:"9px",color:_ghToken?"var(--gd)":"var(--t4)",marginBottom:"7px"}},
    _ghToken?"☁ Sincronizzazione GitHub attiva":"⚠ Solo locale — configura ⚙ Token GH per condividere"));
  // Autore
  const authRow=h("div",{className:"note-form-row"});
  authRow.appendChild(h("span",{style:{fontSize:"10px",color:"var(--t3)"}},"Autore:"));
  NOTE_AUTHORS.forEach(a=>{
    const btn=h("button",{className:"note-author-btn"+(author===a.key?" sel":""),onClick:()=>{
      author=a.key;
      authRow.querySelectorAll(".note-author-btn").forEach(b=>b.classList.remove("sel"));
      btn.classList.add("sel");
    }},a.label);
    authRow.appendChild(btn);
  });
  form.appendChild(authRow);
  // Categoria
  const catRow=h("div",{className:"note-form-row"});
  catRow.appendChild(h("span",{style:{fontSize:"10px",color:"var(--t3)"}},"Riferimento:"));
  NOTE_CATS.forEach(c=>{
    const btn=h("button",{className:"note-cat-btn"+(cat===c.key?" sel":""),onClick:()=>{
      cat=c.key;
      catRow.querySelectorAll(".note-cat-btn").forEach(b=>b.classList.remove("sel"));
      btn.classList.add("sel");
    }},c.label);
    catRow.appendChild(btn);
  });
  form.appendChild(catRow);
  // Data
  const dateRow=h("div",{className:"note-form-row"});
  dateRow.appendChild(h("span",{style:{fontSize:"10px",color:"var(--t3)"}},"Data:"));
  const dateInp=h("input",{className:"ov-inp",type:"date",value:date});
  dateInp.addEventListener("change",e=>{date=e.target.value;});
  dateRow.appendChild(dateInp);
  form.appendChild(dateRow);
  // Testo
  const ta=h("textarea",{className:"notes-area",placeholder:"Testo della nota…",style:{height:"60px",marginBottom:"7px"}});
  ta.value=text;
  ta.addEventListener("input",e=>{text=e.target.value;});
  form.appendChild(ta);
  requestAnimationFrame(()=>ta.focus());
  // Azioni
  const btnRow=h("div",{className:"note-form-row"});
  btnRow.appendChild(h("button",{className:"ov-save",onClick:()=>{
    if(!text.trim()){alert("Inserisci il testo della nota.");return;}
    const sid=String(comuneId);
    const arr=JSON.parse(JSON.stringify(_getNotes(comuneId)));
    const noteObj={cat,date,text:text.trim(),author,children:[]};
    if(mode==="new"){
      arr.push(noteObj);
      arr.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
    }else if(mode==="edit"){
      const old=_getAtPath(arr,path);
      noteObj.children=old?.children||[];
      _setAtPath(arr,path,noteObj);
    }else if(mode==="reply"){
      const parent=_getAtPath(arr,path);
      if(!parent.children)parent.children=[];
      parent.children.push(noteObj);
    }
    ONLINE_NOTES[sid]=arr;LOCAL_NOTES[sid]=arr;
    saveNotes();saveOverrideOnline();
    editingNote=null;render();
  }},isNew?"✓ Salva":"✓ Aggiorna"));
  btnRow.appendChild(h("button",{className:"ov-del",onClick:()=>{editingNote=null;render();}},"✗ Annulla"));
  form.appendChild(btnRow);
  return form;
}

function makeDocPanel(title,docs,s,comuneId){
  const pan=h("div",{className:"dp"},h("div",{className:"dp-t"},title));
  docs.forEach(d=>{
    const ds=getDocSt(s,d.key),cfg=ST[ds.status]||ST.missing;
    const hk=comuneId+"_"+d.key,hOpen=openHist[hk];
    const ovKey=String(comuneId)+"_"+d.key;
    const hasOv=!!_mergedOverrides()[ovKey];
    const isEditing=editingOv?.id===comuneId&&editingOv?.key===d.key;
    const row=h("div",{className:"dr"});

    // Info documento
    const left=h("div",null,
      h("span",{style:{fontSize:"12px",color:"#cbd5e1"}},d.label),
      hasOv?h("span",{className:"ov-badge"},"✏ manuale"):null
    );
    if(ds.first_upload)
      left.appendChild(h("div",{style:{fontSize:"10px",color:"var(--t4)",fontFamily:"var(--m)",marginTop:"2px"}},"Primo: "+fmtDate(ds.first_upload)));
    if(ds.last_upload&&ds.last_upload!==ds.first_upload)
      left.appendChild(h("div",{style:{fontSize:"10px",color:"var(--t4)",fontFamily:"var(--m)"}},"Ultimo: "+fmtDate(ds.last_upload)));
    if(ds.current_file)
      left.appendChild(h("div",{style:{fontSize:"9px",color:"var(--t4)",fontFamily:"var(--m)",marginTop:"1px",wordBreak:"break-all"}},
        ds.current_file+(ds.current_size?" ("+fmtSize(ds.current_size)+")":"")));
    row.appendChild(left);

    // Badge, storico e pulsante override
    const right=h("div",{className:"dr-st"});
    right.appendChild(h("span",{className:"dr-badge",style:{background:cfg.bg,color:cfg.color}},cfg.icon+" "+cfg.label));
    if(ds.replaced)right.appendChild(h("span",{className:"dr-badge",style:{background:"#fef3c7",color:"var(--yd)"}},"Sostituito"));
    if(ds.file_count&&ds.file_count>1)right.appendChild(h("span",{className:"dr-badge",style:{background:"#e0e7ff",color:"#4f46e5"}},ds.file_count+" file"));
    if(ds.upload_history?.length)
      right.appendChild(h("span",{className:"dr-hist",
        onClick:e=>{e.stopPropagation();openHist[hk]=!hOpen;render();}},
        (hOpen?"▲":"▼")+" "+ds.upload_history.length+" versioni"));
    right.appendChild(h("button",{
      className:"ov-btn"+(hasOv?" active":""),
      title:hasOv?"Override manuale attivo — clicca per modificare":"Inserisci data/stato manuale",
      onClick:async e=>{
        e.stopPropagation();
        if(!await _requireUnlock())return;
        if(_userRole!=="admin"){alert("Accesso in sola lettura.");return;}
        editingOv=isEditing?null:{id:comuneId,key:d.key};
        render();
      }
    },"✏"));
    row.appendChild(right);
    pan.appendChild(row);

    // Form override inline
    if(isEditing){
      const merged0=_mergedOverrides();
      const ov=merged0[ovKey]||{status:ds.status||"missing",date:ds.first_upload?ds.first_upload.slice(0,10):"",note:""};
      const form=h("div",{className:"ov-form"});
      form.appendChild(h("div",{style:{fontSize:"10px",color:"var(--yd)",marginBottom:"7px",fontWeight:"600"}},"✏ Override manuale — "+d.label));

      // Indicatore stato salvataggio remoto
      const remoteLbl=h("div",{style:{fontSize:"9px",color:_ghToken?"var(--gd)":"var(--t4)",marginBottom:"5px"}},
        _ghToken?"☁ Sincronizzazione GitHub attiva":"⚠ Solo locale — configura ⚙ Token GH per condividere");
      form.appendChild(remoteLbl);

      // Stato
      const stRow=h("div",{className:"ov-row"});
      stRow.appendChild(h("span",{style:{fontSize:"10px",color:"var(--t3)"}},"Stato:"));
      [{st:"received",label:"✓ Ricevuto"},{st:"missing",label:"✗ Mancante"}].forEach(({st,label})=>{
        const active=ov.status===st;
        stRow.appendChild(h("button",{
          className:"ov-st"+(active?(st==="received"?" sel-g":" sel"):""),
          onClick:()=>{
            const v={...ov,status:st};
            LOCAL_OVERRIDES[ovKey]=v;
            ONLINE_OVERRIDES[ovKey]=v;
            saveOverrides();
            saveOverrideOnline();
            render();
          }
        },label));
      });
      form.appendChild(stRow);

      // Data ricezione
      const dateRow=h("div",{className:"ov-row"});
      dateRow.appendChild(h("span",{style:{fontSize:"10px",color:"var(--t3)"}},"Data ricezione:"));
      const dateInp=h("input",{className:"ov-inp",type:"date",value:ov.date||""});
      dateInp.addEventListener("change",e=>{
        const v={...((_mergedOverrides())[ovKey]||ov),date:e.target.value};
        LOCAL_OVERRIDES[ovKey]=v;
        ONLINE_OVERRIDES[ovKey]=v;
        saveOverrides();
        saveOverrideOnline();
      });
      dateRow.appendChild(dateInp);
      form.appendChild(dateRow);

      // Azioni
      const btnRow=h("div",{className:"ov-row"});
      btnRow.appendChild(h("button",{className:"ov-save",onClick:()=>{editingOv=null;render();}},"✓ Chiudi"));
      btnRow.appendChild(h("button",{className:"ov-del",onClick:()=>{
        delete LOCAL_OVERRIDES[ovKey];
        delete ONLINE_OVERRIDES[ovKey];
        saveOverrides();
        saveOverrideOnline();
        editingOv=null;render();
      }},"↩ Ripristina automatico"));
      form.appendChild(btnRow);
      pan.appendChild(form);
    }

    // Storico espanso
    if(hOpen&&ds.upload_history?.length){
      const hb=h("div",{className:"hist-block"});
      ds.upload_history.slice().reverse().forEach(ev=>{
        const ec=EV_STYLE[ev.event]||{bg:"var(--b)",color:"var(--t3)",label:ev.event};
        hb.appendChild(h("div",{className:"hist-row"},
          h("span",{className:"hist-ev",style:{background:ec.bg,color:ec.color}},ec.label),
          h("span",{style:{color:"var(--t3)"}},fmtDT(ev.time)),
          ev.file?h("span",{style:{color:"var(--t4)",flex:"1",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},ev.file):null
        ));
      });
      pan.appendChild(hb);
    }
  });
  return pan;
}

// ── TABLE ──
function renderTable(fil){
  const tw=h("div",{className:"tw"}),tb=h("table"),thead=h("thead"),hr=h("tr");
  ["#","Comune","Gestore","G:Tool","G:Rel","G:Dich","G:Alt","C:Tool","C:Rel","C:Dich","C:Alt","PEF","%","Proc.","1° Upload","Ultimo G","Ultimo C","Drive"].forEach((t,i)=>
    hr.appendChild(h("th",{className:i<=2?"l":""},t)));
  thead.appendChild(hr);tb.appendChild(thead);
  const tbody=h("tbody");
  fil.forEach(c=>{
    const s=getEffectiveState(c.id),p=pct(s);
    const pc=s?.processabile?PR[s.processabile]:null;
    const col=s===null?"var(--t4)":p===100?"var(--green)":p>0?"var(--yel)":"var(--t3)";
    const firstUp=s?ALL_DOCS.map(d=>getDocSt(s,d.key).first_upload).filter(Boolean).sort()[0]:null;
    const lastG=s?DOC_G.map(d=>getDocSt(s,d.key).last_upload).filter(Boolean).sort().pop():null;
    const lastC=s?DOC_C.map(d=>getDocSt(s,d.key).last_upload).filter(Boolean).sort().pop():null;
    const tr=h("tr",{onClick:()=>{selId=c.id;view="dashboard";render()}});
    if(s?.last_scan_error)tr.style.borderLeft="2px solid var(--rd)";
    tr.appendChild(h("td",null,String(c.id)));
    tr.appendChild(h("td",{style:{fontWeight:"600",color:"#f1f5f9"}},c.comune));
    tr.appendChild(h("td",{style:{color:"var(--t2)"}},c.gestore));
    DOC_G.forEach(d=>{const ds=getDocSt(s,d.key),cfg=ST[ds.status]||ST.missing;
      tr.appendChild(h("td",{style:{textAlign:"center",color:cfg.color,fontWeight:"600"},title:d.label+(ds.first_upload?"\nPrimo: "+fmtDate(ds.first_upload):"")+(ds.last_upload?"\nUltimo: "+fmtDate(ds.last_upload):"")},cfg.icon))});
    DOC_C.forEach(d=>{const ds=getDocSt(s,d.key),cfg=ST[ds.status]||ST.missing;
      tr.appendChild(h("td",{style:{textAlign:"center",color:cfg.color,fontWeight:"600"},title:d.label+(ds.first_upload?"\nPrimo: "+fmtDate(ds.first_upload):"")+(ds.last_upload?"\nUltimo: "+fmtDate(ds.last_upload):"")},cfg.icon))});
    DOC_ATA5.forEach(d=>{const ds=getDocSt(s,d.key),cfg=ST[ds.status]||ST.missing;
      tr.appendChild(h("td",{style:{textAlign:"center",color:cfg.color,fontWeight:"600"},title:d.label+(ds.first_upload?"\nPrimo: "+fmtDate(ds.first_upload):"")+(ds.last_upload?"\nUltimo: "+fmtDate(ds.last_upload):"")},cfg.icon))});
    tr.appendChild(h("td",{style:{textAlign:"center",fontWeight:"700",color:col,fontFamily:"var(--m)"}},s!==null?String(p):"—"));
    const ptd=h("td",{style:{textAlign:"center"}});
    if(pc)ptd.appendChild(h("span",{className:"badge",style:{background:pc.bg,color:pc.color}},pc.label));
    else ptd.appendChild(h("span",{style:{color:"var(--t4)",fontSize:"10px"}},"—"));
    tr.appendChild(ptd);
    tr.appendChild(h("td",{style:{textAlign:"center",fontSize:"10px",fontFamily:"var(--m)",color:"var(--t3)"}},fmtDate(firstUp)));
    tr.appendChild(h("td",{style:{textAlign:"center",fontSize:"10px",fontFamily:"var(--m)",color:"var(--t3)"}},fmtDate(lastG)));
    tr.appendChild(h("td",{style:{textAlign:"center",fontSize:"10px",fontFamily:"var(--m)",color:"var(--t3)"}},fmtDate(lastC)));
    const dtd=h("td",{style:{textAlign:"center"}});
    const a=h("a",{href:c.url,target:"_blank",className:"drive-lnk"},"↗");
    a.addEventListener("click",e=>e.stopPropagation());
    dtd.appendChild(a);tr.appendChild(dtd);
    tbody.appendChild(tr);
  });
  tb.appendChild(tbody);tw.appendChild(tb);return tw;
}
